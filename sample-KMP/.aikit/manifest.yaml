manifest_version: "3.0.0"
language_code: ru
project:
  name: "Sample KMP"
  slug: "sample-kmp"
  description: "Kotlin Multiplatform — Compose UI (Android/iOS/JVM/Web) + Ktor server"
stack:
  languages: [kotlin]
  frameworks: [compose-multiplatform, ktor]
  profiles: [solid, clean-architecture]
  build_command: "./gradlew build"
  test_command: "./gradlew test"
  lint_command: "./gradlew check"
  format_command: "./gradlew check"
  run_command: "./gradlew :composeApp:run"
modules:
  - name: composeApp
    source_root: composeApp/src/commonMain
    test_root: composeApp/src/commonTest
    responsibility: "KMP Compose UI-приложение (Android, iOS, JVM, JS, Wasm)"
  - name: shared
    source_root: shared/src/commonMain
    test_root: shared/src/commonTest
    responsibility: "Общая KMP-библиотека — бизнес-логика и платформенные абстракции"
  - name: server
    source_root: server/src/main
    test_root: server/src/test
    responsibility: "Ktor JVM-сервер (backend API)"
  - name: iosApp
    source_root: iosApp/iosApp
    test_root: iosApp/iosApp
    responsibility: "iOS нативная обёртка (Swift + ComposeApp framework)"
targets:
  - id: claude-code
    native_provider: anthropic
    adapter: claude-code
render_targets: [claude-code]
providers:
  - id: anthropic
    kind: anthropic
    auth: subscription
models:
  - id: primary
    provider: anthropic
    family: anthropic
    model: claude-sonnet-4-6
    tier: balanced
    priority: 100
prompt_dialects:
  - id: anthropic
    path: dialects/anthropic
target_adapters:
  - id: claude-code
    path: target_adapters/claude-code
agents:
  - id: Main
    role: orchestrator
    description: "AI-Kit v3 pipeline driver — runs Session 1/2/3 of /kit, /kit-do, /kit-fix"
    prompt: { include: prompts/Main.md }
    tools: [Read, Edit, Write, Glob, Grep, Bash]
  - id: Researcher
    description: "Session 1 Stage 1 helper — returns one focused digest, never writes code"
    prompt: { include: prompts/Researcher.md }
    tools: [Read, Glob, Grep, WebFetch]
policies:
  forbidden_patterns:
    - "hardcoded API keys or secrets in source files"
    - "platform-specific code in commonMain without expect/actual"
  optional_skills:
    - debug-loop
    - tdd-cycle
    - security-checklist
    - doubt-driven-review
    - simplification-pass
    - adr-on-decision
knowledge: {}
