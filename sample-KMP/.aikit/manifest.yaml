manifest_version: "3.0.0"
language_code: ru

project:
  name: "sample-KMP"
  slug: "sample-kmp"
  description: "Kotlin Multiplatform sandbox — Compose UI (Android/iOS/JVM/JS/Wasm) + Ktor server"

stack:
  languages: [kotlin]
  frameworks: [compose-multiplatform, ktor]
  build_command:   "./gradlew build"
  test_command:    "./gradlew test"
  lint_command:    "./gradlew check"
  format_command:  "./gradlew ktfmtCheck"
  run_command:     "./gradlew :server:run"
  profiles:
    - clean-architecture
    - solid

modules:
  - name: composeApp
    source_root: composeApp/src/commonMain
    test_root:   composeApp/src/commonTest
    responsibility: "Multiplatform UI — Android, iOS, JVM Desktop, JS, Wasm"
  - name: server
    source_root: server/src/main/kotlin
    test_root:   server/src/test/kotlin
    responsibility: "Ktor backend (JVM)"
  - name: shared
    source_root: shared/src/commonMain
    test_root:   shared/src/commonTest
    responsibility: "Shared KMP library — domain models and common logic"

targets:
  - id: claude-code
    native_provider: anthropic
    adapter: claude-code

render_targets: [claude-code]

providers:
  - id: anthropic
    kind: anthropic
    auth: subscription

models:
  - id: sonnet
    provider: anthropic
    family: anthropic
    model: claude-sonnet-4-6
    tier: balanced
    priority: 100

prompt_dialects:
  - id: anthropic
    path: dialects/anthropic

target_adapters:
  - id: claude-code
    path: target_adapters/claude-code

agents:
  - id: Main
    role: orchestrator
    description: "AI-Kit v3 pipeline driver — runs Session 1/2/3 of /kit, /kit-do, /kit-fix"
    prompt: { include: prompts/Main.md }
    tools: [Read, Edit, Write, Glob, Grep, Bash]
  - id: Researcher
    description: "Session 1 Stage 1 helper — returns one focused digest, never writes code"
    prompt: { include: prompts/Researcher.md }
    tools: [Read, Glob, Grep, WebFetch]

policies:
  forbidden_patterns:
    - "platform-specific code in commonMain without expect/actual"
    - "hardcoded platform checks via if-else instead of expect/actual"
    - "Прямое обращение к Dispatchers.IO / Dispatchers.Default / Dispatchers.Main внутри класса без инжекции через конструктор — объявите параметр CoroutineDispatcher в конструкторе и используйте его"
    - "Магическая константа — числовой литерал (кроме 0 и 1) использован инлайн в production-коде без именованной val/const (magic number)"

knowledge: {}
