manifest_version: "3.0.0"
language_code: ru

project:
  name: "sample-KMP"
  slug: "sample-kmp"
  description: "Compose Multiplatform sandbox targeting Android, iOS, Desktop, Web (Wasm/JS), and Ktor server"

stack:
  languages: [kotlin]
  frameworks: [compose-multiplatform, ktor]
  build_command:   ".\\gradlew.bat build"
  test_command:    ".\\gradlew.bat :shared:jvmTest"
  lint_command:    ""
  format_command:  ""
  run_command:     ".\\gradlew.bat :composeApp:run"

modules:
  - name: composeApp
    source_root: composeApp/src/commonMain/kotlin
    test_root:   composeApp/src/commonTest/kotlin
    responsibility: "Shared Compose UI for Android, iOS, Desktop, and Web targets"
  - name: server
    source_root: server/src/main/kotlin
    test_root:   server/src/test/kotlin
    responsibility: "Ktor server application"
  - name: shared
    source_root: shared/src/commonMain/kotlin
    test_root:   shared/src/commonTest/kotlin
    responsibility: "Shared business logic and data models across all targets"

targets:
  - id: claude-code
    native_provider: anthropic
    adapter: claude-code

render_targets: [claude-code]

providers:
  - id: anthropic
    kind: anthropic
    auth: subscription

models:
  - id: claude-sonnet
    provider: anthropic
    family: anthropic
    model: claude-sonnet-4-6
    tier: balanced
    priority: 100

prompt_dialects:
  - id: anthropic
    path: dialects/anthropic

target_adapters:
  - id: claude-code
    path: target_adapters/claude-code

agents:
  - id: Main
    description: "AI-Kit v3 pipeline driver — runs Session 1/2/3 of /kit, /kit-do, /kit-fix"
    prompt: { include: prompts/Main.md }
    tools: [Read, Edit, Write, Glob, Grep, Bash]
  - id: Researcher
    description: "Session 1 Stage 1 helper — returns one focused digest, never writes code"
    prompt: { include: prompts/Researcher.md }
    tools: [Read, Glob, Grep, WebFetch]

policies:
  forbidden_patterns:
    - "No platform-specific code (android/ios/jvm/js) in commonMain source sets"
    - "No hardcoded API keys or secrets in source files or config"
    - "No committing build/ or .gradle/ directories"

knowledge: {}
