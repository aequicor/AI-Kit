manifest_version: "3.0.0"
language_code: ru

project:
  name: "sample-KMP"
  slug: "sample-kmp"
  description: "Kotlin Multiplatform sandbox — Compose Multiplatform UI + Ktor server"

stack:
  languages: [kotlin]
  frameworks: [compose-multiplatform, ktor]
  build_command:  "./gradlew build"
  test_command:   "./gradlew test"
  lint_command:   "./gradlew check"
  format_command: ""
  run_command:    "./gradlew :server:run"
  profiles: [clean-architecture, solid]

modules:
  - name: composeApp
    source_root: composeApp/src/commonMain
    test_root:   composeApp/src/commonTest
    responsibility: "Compose Multiplatform UI (Android, iOS, JVM, JS, WasmJS)"
  - name: server
    source_root: server/src/main
    test_root:   server/src/test
    responsibility: "Ktor/Netty HTTP server (JVM)"
  - name: shared
    source_root: shared/src/commonMain
    test_root:   shared/src/commonTest
    responsibility: "Общая KMP-библиотека, используемая всеми платформами"

targets:
  - id: claude-code
    native_provider: anthropic
    adapter: claude-code

render_targets: [claude-code]

providers:
  - id: anthropic
    kind: anthropic
    auth: subscription

models:
  - id: claude-sonnet
    provider: anthropic
    family: anthropic
    model: claude-sonnet-4-6
    tier: balanced
    priority: 100

prompt_dialects:
  - id: anthropic
    path: dialects/anthropic

target_adapters:
  - id: claude-code
    path: target_adapters/claude-code

agents:
  - id: Main
    description: "AI-Kit v3 pipeline driver — runs Session 1/2/3 of /kit, /kit-do, /kit-fix"
    prompt: { include: prompts/Main.md }
    tools: [Read, Edit, Write, Glob, Grep, Bash]
  - id: Researcher
    description: "Session 1 Stage 1 helper — returns one focused digest, never writes code"
    prompt: { include: prompts/Researcher.md }
    tools: [Read, Glob, Grep, WebFetch]

policies:
  forbidden_patterns:
    - "platform-specific API в commonMain без expect/actual"
    - "hardcoded IP или порт вместо конфига"
    - "блокирующие вызовы (Thread.sleep, runBlocking в UI-слое)"

knowledge: {}
