# kit-manifect.yaml — universal AI agent team manifest
# Schema version: 1.0.0
#
# ═══════════════════════════════════════════════════════════════════════════
# CONCEPTUAL MODEL
# ═══════════════════════════════════════════════════════════════════════════
#
# Three orthogonal axes of separation:
#
#   1. MODEL FAMILY  → prompt dialect (Anthropic XML / OpenAI markdown /
#                                       Qwen DO-DON'T / DeepSeek / generic)
#   2. TASK TYPE     → model strength (planning needs reasoner,
#                                       triage needs fast, ...)
#   3. RUNNER/TARGET → narrows the model pool
#                      (Claude Code = anthropic only, OpenCode = anything, …)
#
# Agents declare WHAT THEY NEED (capabilities, tier).
# The renderer resolves WHICH MODEL at render time, given the active
# target's available providers. Same manifest → correct configs for
# Claude Code, Cursor, OpenCode, Aider — without editing any agent.
#
# Knowledge architecture follows the three-tier "Codified Context" pattern
# (Vasilopoulos 2026):
#
#   constitution → HOT, always-loaded routing layer (CLAUDE.md / AGENTS.md)
#   specialists  → agents invoked per task (declared in `agents:` section)
#   specs        → COLD, on-demand spec library (pluggable backend)
#   session      → ephemeral working memory per task (gitignored)
#
# ═══════════════════════════════════════════════════════════════════════════

manifest_version: "1.0.0"
kit_version: "0.1.0"
language_code: en

# ═══════════════════════════════════════════════════════════════════════════
# PROJECT
# ═══════════════════════════════════════════════════════════════════════════
project:
  name: "My Project"             # human-readable name (shown to users)
  slug: "my-project"             # machine-id: lowercase ASCII, digits, dashes only.
                                 # Used in file names, URIs, log keys, eval-run IDs.
                                 # If omitted, init-script derives it from `name`
                                 # (spaces → dashes, non-ASCII transliterated/dropped).
  description: "One-line description."
  repo_url: "https://github.com/owner/repo"
  owners: ["po@example.com"]

stack:
  languages: [typescript]
  frameworks: [next.js, prisma]
  build_command:   "pnpm build"
  compile_command: "pnpm tsc --noEmit"
  lint_command:    "pnpm lint"
  test_command:    "pnpm test"
  format_command:  "pnpm format"
  run_command:     "pnpm dev"

modules:
  - name: web
    source_root: "apps/web/src/"
    test_root:   "apps/web/tests/"
    docs_path:   "vault/web/"
    responsibility: "Next.js app — pages, API routes, UI"
  - name: core
    source_root: "packages/core/src/"
    test_root:   "packages/core/tests/"
    docs_path:   "vault/core/"
    responsibility: "Domain logic, DB schema, payment integrations"

# ═══════════════════════════════════════════════════════════════════════════
# TARGETS (runners)
# ═══════════════════════════════════════════════════════════════════════════
# Each target gets its own rendered config tree:
#   claude-code → .claude/ + CLAUDE.md
#   cursor      → .cursor/rules/*.mdc + .cursor/mcp.json
#   aider       → .aider.conf.yml + CONVENTIONS.md
#   opencode    → .opencode/agents/*.md + opencode.json + AGENTS.md
#
# native_provider — provider the runner uses by default
# can_use_via     — extra providers it supports natively
# Anything not in either list requires a router (warning at render time).
#
# Render concerns (config_dir / instruction_file / artifact paths / frontmatter)
# live in target_adapters[] packages — see ./target_adapters/<id>/adapter.yaml.
# Adapter is auto-bound by id; override with `adapter: <other_id>` if needed.

targets:
  - id: claude-code
    native_provider: anthropic
    can_use_via: []

  - id: cursor
    native_provider: anthropic
    can_use_via: [openai, google, xai]

  - id: aider
    native_provider: any
    can_use_via: [anthropic, openai, google, deepseek, openrouter, ollama]

  - id: opencode
    native_provider: any
    can_use_via: [anthropic, openai, openrouter, ollama, custom]

  - id: qwen-code
    native_provider: alibaba          # tuned for Qwen3-Coder; fork of Gemini CLI
    can_use_via: [openai, anthropic, google, openrouter, ollama, custom]

# Which targets to actually render in this manifest run:
render_targets: [claude-code, cursor]

# ═══════════════════════════════════════════════════════════════════════════
# PROVIDERS
# ═══════════════════════════════════════════════════════════════════════════
# Where the tokens come from. API keys are referenced by env-var name only;
# never written into any rendered file.

providers:
  - id: anthropic
    kind: anthropic
    api_key_env: ANTHROPIC_API_KEY
    timeout_seconds: 120
    max_retries: 2

  - id: openai
    kind: openai
    api_key_env: OPENAI_API_KEY

  - id: openrouter
    kind: openai-compatible
    base_url: "https://openrouter.ai/api/v1"
    api_key_env: OPENROUTER_API_KEY

  - id: alibaba
    kind: openai-compatible          # DashScope / ModelStudio expose OpenAI-compatible API
    base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    api_key_env: DASHSCOPE_API_KEY

  - id: local
    kind: ollama
    base_url: "http://localhost:11434"

# ═══════════════════════════════════════════════════════════════════════════
# MODELS
# ═══════════════════════════════════════════════════════════════════════════
# Self-describing pool. Agents reference these by tag (capabilities/tier),
# not by id. id is used only for `pin` overrides and resolver output logging.
#
#   family       — selects the prompt dialect at render time
#                  (anthropic / openai / google / qwen / deepseek / llama /
#                   mistral / generic)
#   tier         — strength bucket: fast | balanced | reasoner
#   capabilities — soft tags for needs[] filtering
#   priority     — integer; higher wins when all other sort keys are equal
#                  (deterministic tie-break; default 0)

models:
  - id: opus
    provider: anthropic
    model: claude-opus-4-7
    family: anthropic
    tier: reasoner
    capabilities: [reasoning, code, vision, tools, long-context]
    context_window: 200000
    params: { temperature: 0.2, max_tokens: 8000, reasoning_effort: high }
    cost_hint: premium
    priority: 10

  - id: sonnet
    provider: anthropic
    model: claude-sonnet-4-6
    family: anthropic
    tier: balanced
    capabilities: [code, tools, long-context]
    context_window: 200000
    params: { temperature: 0.1, max_tokens: 16000 }
    cost_hint: balanced
    priority: 10

  - id: haiku
    provider: anthropic
    model: claude-haiku-4-5
    family: anthropic
    tier: fast
    capabilities: [tools]
    cost_hint: cheap
    priority: 10

  - id: gpt5
    provider: openai
    model: gpt-5
    family: openai
    tier: reasoner
    capabilities: [reasoning, code, vision, tools]
    params: { reasoning_effort: high }
    cost_hint: premium
    priority: 5

  - id: qwen-coder
    provider: openrouter
    model: qwen/qwen3-coder
    family: qwen
    tier: balanced
    capabilities: [code, tools]
    cost_hint: cheap
    priority: 3

  - id: qwen-alibaba                 # native binding for Qwen Code via Alibaba Coding Plan
    provider: alibaba
    model: qwen3-coder-plus
    family: qwen
    tier: balanced
    capabilities: [code, tools, long-context]
    cost_hint: balanced
    priority: 5

  - id: deepseek-r1
    provider: openrouter
    model: deepseek/deepseek-r1
    family: deepseek
    tier: reasoner
    capabilities: [reasoning, code]
    cost_hint: cheap
    priority: 3

  - id: local-coder
    provider: local
    model: qwen3-coder:30b
    family: qwen
    tier: balanced
    capabilities: [code]
    cost_hint: cheap
    priority: 1

# ═══════════════════════════════════════════════════════════════════════════
# TASK TYPES (project-wide routing defaults — optional)
# ═══════════════════════════════════════════════════════════════════════════
# Agents inherit these when they don't specify their own by_task entry.
# Use this to set kit-wide policy: "all planning needs a reasoner".

task_types:
  - id: planning             # spec, architecture, requirement decomposition
    prefers: reasoner
    needs: [reasoning, long-context]

  - id: implementation       # writing production code + tests
    prefers: balanced
    needs: [code]

  - id: review               # code review, DoD, traceability
    prefers: reasoner
    needs: [reasoning, code]

  - id: debug
    prefers: reasoner
    needs: [code, reasoning]

  - id: refactor
    prefers: balanced
    needs: [code]

  - id: research            # docs / web lookup before implementation
    prefers: reasoner
    needs: [reasoning]

  - id: security-audit
    prefers: reasoner
    min_tier: reasoner      # hard floor — never downgrade
    needs: [reasoning, code]

  - id: triage              # cheap classification (e.g. risk lane)
    prefers: fast

  - id: summarize           # runbooks, status reports, retros
    prefers: fast

# ═══════════════════════════════════════════════════════════════════════════
# PROMPT DIALECTS — packages on disk
# ═══════════════════════════════════════════════════════════════════════════
# Each dialect is a self-contained package. The renderer loads its
# dialect.yaml, then resolves wrappers / snippets / style relative to that
# package. The dialect is selected at render time based on the resolved
# model's `family` field.
#
# A dialect package contains:
#   dialect.yaml         — meta + index of wrappers/snippets/style
#   wrappers/agent.md    — wrap around agent prompt body
#   wrappers/skill.md    — wrap around SKILL.md body
#   wrappers/command.md  — wrap around slash-command body
#   wrappers/rule.md     — wrap around rule body
#   wrappers/user_prompt.md
#   snippets/*.md        — reusable fragments invoked via {{snippet:NAME}}
#   conventions.md       — human docs + linter rules for this family
#
# `path` is relative to this manifest. To pull from an external repo:
#   - id: company-house-style
#     source: { kind: git, url: https://github.com/acme/dialect-house, ref: v1.2.0 }

prompt_dialects:
  - { id: anthropic, path: ./dialects/anthropic }
  - { id: openai,    path: ./dialects/openai    }
  - { id: qwen,      path: ./dialects/qwen      }
  - { id: deepseek,  path: ./dialects/deepseek  }
  - { id: generic,   path: ./dialects/generic   }

# ═══════════════════════════════════════════════════════════════════════════
# TARGET ADAPTERS — packages on disk
# ═══════════════════════════════════════════════════════════════════════════
# An adapter knows how to lay out files for one runner: artifact paths,
# frontmatter shape, capabilities, render-time transforms. Dialect handles
# WHAT to write (per-family prose); adapter handles WHERE and IN WHAT FORMAT
# (per-runner mechanics). The two are orthogonal — the renderer calls them
# in sequence: first the dialect wraps the body, then the adapter places it.
#
# An adapter package contains:
#   adapter.yaml          — paths, capabilities, transforms
#   frontmatter/*.yaml    — per-artifact frontmatter templates
#   settings.json.template — optional global config file
#   conventions.md        — adapter docs (what this runner supports / doesn't)
#
# Adapter is auto-bound by id-match with targets[].id. Override via
# targets[].adapter: <other_id> if needed.

target_adapters:
  - { id: claude-code, path: ./target_adapters/claude-code }
  - { id: cursor,      path: ./target_adapters/cursor      }
  - { id: opencode,    path: ./target_adapters/opencode    }
  - { id: aider,       path: ./target_adapters/aider       }
  - { id: qwen-code,   path: ./target_adapters/qwen-code   }

# ═══════════════════════════════════════════════════════════════════════════
# SHARED ASSETS — fallback for snippets across dialects
# ═══════════════════════════════════════════════════════════════════════════
# When a body uses {{snippet:NAME}}, the renderer resolves in this order:
#   1. dialects/<active>/snippets/NAME.md   (per-family specialization)
#   2. <shared.path>/snippets/NAME.md       (project-wide default)
#   3. error if neither exists
#
# Use _shared/snippets for content that's the same across families
# (project description, stack summary, DoD checklist).
# Override per-family by dropping the same filename into a dialect's snippets/.

shared:
  path: ./_shared

# ═══════════════════════════════════════════════════════════════════════════
# AGENTS
# ═══════════════════════════════════════════════════════════════════════════
# Each agent declares WHAT IT NEEDS, not which model to use.
# The renderer resolves a concrete model per (agent, task, target).
#
# model_selection fields:
#   needs            — required capabilities (hard filter)
#   prefers          — preferred tier (soft; falls back if unavailable)
#   min_tier         — minimum tier (hard floor; render fails if not met)
#   max_cost         — maximum cost_hint allowed (cheap | balanced | premium)
#   pin              — escape hatch: force a specific models[].id
#   by_task          — overrides per task_type (merged with task_types[])
#   by_severity      — overrides for bug-fix workflows (low/medium/high/critical)
#   custom_overrides — arbitrary keyed overrides for custom orchestrator skills
#
# prompt forms:
#   short:  prompt: { include: prompts/X.md }      # one body, dialect-wrapped
#   long:   prompt:
#             default:   { include: prompts/X.md } # default body
#             anthropic: { include: prompts/X.anthropic.md }   # full per-family override
#             qwen:      { include: prompts/X.qwen.md }        # for small coder models
#
# Resolver order for each agent's model:
#   1. by_task[current].pin or by_severity[current].pin or model_selection.pin
#   2. Filter models[] by (provider in target's allowed set) AND needs ⊆ caps
#   3. Apply min_tier, max_cost, policies.model_constraints
#   4. Sort: tier matches `prefers` DESC, cost asc, priority DESC
#   5. Return first; render fails if empty

agents:

  - id: Main
    role: orchestrator
    description: "Single entry point. Classifies tasks and dispatches subagents."
    mode: primary
    model_selection:
      needs: [reasoning, tools]
      prefers: reasoner
      by_task:
        triage:    { prefers: fast }
        summarize: { prefers: fast }
    prompt:
      default: { include: prompts/Main.md }
    tools: ["*"]
    permissions: { edit: true, bash: true, web: true }

  - id: Architect
    role: architect
    description: "Spec.md + plan.md skeleton. One pass, no replan."
    model_selection:
      needs: [reasoning, long-context]
      prefers: reasoner
      min_tier: reasoner          # never downgrade architect
    prompt:
      default: { include: prompts/Architect.md }
    tools: [serena, context7, web-search]
    permissions: { edit: true, web: true }
    context_scope:
      include_paths: ["vault/**", "docs/**", "README.md"]
      max_tokens: 30000

  - id: CodeWriter
    role: code-writer
    description: "TDD-first implementation, one slice at a time."
    model_selection:
      needs: [code]
      prefers: balanced
      by_task:
        debug:    { prefers: reasoner }    # debug pays for thinking
        refactor: { prefers: balanced }
    prompt:
      default:   { include: prompts/CodeWriter.md }
      anthropic: { include: prompts/CodeWriter.anthropic.md }   # XML-tagged variant
      qwen:      { include: prompts/CodeWriter.qwen.md }        # tighter for small models
    tools: [lsp-typescript, serena]
    permissions: { edit: true, bash: true }

  - id: Verifier
    role: verifier
    description: "Mode-driven review (test-execute / pass-A-E / DoD / trace)."
    model_selection:
      needs: [reasoning, code]
      prefers: reasoner
      min_tier: balanced          # never let triage-class do reviews
    prompt:
      default: { include: prompts/Verifier.md }
    permissions: { edit: false, bash: true }

  - id: BugFixer
    role: bug-fixer
    description: "Debug + fix + regression test."
    model_selection:
      needs: [code]
      prefers: balanced
      by_severity:
        critical: { prefers: reasoner, min_tier: reasoner }
        high:     { prefers: reasoner }
        medium:   { prefers: balanced }
        low:      { prefers: balanced, max_cost: cheap }
    prompt:
      default: { include: prompts/BugFixer.md }
    tools: [lsp-typescript, serena]
    permissions: { edit: true, bash: true }

  - id: Researcher
    role: researcher
    description: "Reads docs / web for unfamiliar APIs before CodeWriter starts."
    model_selection:
      needs: [reasoning]
      prefers: fast               # research is mostly read + summarise
    prompt:
      default: { include: prompts/Researcher.md }
    tools: [context7, web-search]
    permissions: { edit: false, web: true }
    targets_override: [claude-code, cursor]   # not rendered for opencode/aider

# ═══════════════════════════════════════════════════════════════════════════
# KNOWLEDGE — three-tier codified context (Vasilopoulos 2026)
# ═══════════════════════════════════════════════════════════════════════════
# Tiers serve different roles and scale differently:
#
#   1. constitution — HOT, always-loaded routing layer
#                     ("for X look in spec-A, for Y in spec-B")
#                     Compact (1 file per target). Usually filesystem.
#                     Rendered into target's instruction_file
#                     (CLAUDE.md / AGENTS.md / .cursorrules / CONVENTIONS.md).
#
#   2. specialists  — agents invoked per task. Already covered by `agents:`
#                     above; this block declares the index that maps
#                     triggers → agents.
#
#   3. specs        — COLD knowledge base, retrieved on-demand.
#                     One artefact per subsystem / feature. Pluggable backend:
#                     scales from 5 markdown files to 500-spec MCP server
#                     without changing agent prompts.
#
#   4. session      — ephemeral per-task working memory (gitignored).
#                     Distinct from cold specs: written and discarded inside
#                     a single workflow run.
#
# Read/write contract is uniform across backends — agents call
# {{KNOWLEDGE.read("path")}}, {{KNOWLEDGE.write(...)}}, {{KNOWLEDGE.search(...)}}
# and the renderer wires the right transport per backend.

knowledge:

  # ── Tier 1: HOT memory ─────────────────────────────────────────────
  constitution:
    # The renderer composes these blocks into the target's instruction_file.
    # Order matters: routing first, conventions second, retrieval-hooks last.
    sections:
      - routing:               # "if task X → look in spec Y"
          source: { include: knowledge/routing-table.md }
      - conventions:           # naming, architecture rules, do-not patterns
          source: { include: knowledge/conventions.md }
      - retrieval_hooks:       # how to query cold-tier from inside a session
          source: { include: knowledge/retrieval-hooks.md }
      - orchestration:         # how subagents coordinate (gates, hand-offs)
          source: { include: knowledge/orchestration.md }

    # Hard cap so the constitution doesn't drift into a data dump.
    max_tokens: 4000

  # ── Tier 2: SPECIALISTS index ──────────────────────────────────────
  # Triggers map to agents declared in agents[] above.
  specialists:
    triggers:
      - { match: "auth/**",         invoke: AuthSpecialist }
      - { match: "payments/**",     invoke: PaymentsSpecialist }
      - { match: "*.sql migration", invoke: DBSpecialist }
      - { match: "task: refactor",  invoke: CodeWriter, with_task: refactor }

  # ── Tier 3: COLD memory (specs) ────────────────────────────────────
  # Discriminated by `kind`. Switch backends without touching prompts.
  specs:
    kind: filesystem               # filesystem | mcp | http | composite
    path: vault/specs              # repo-relative root for filesystem kind
    layout:                        # logical keys agents resolve by name
      feature:   "features/{module}/{feature}/spec.md"
      plan:      "features/{module}/{feature}/plan.md"
      retro:     "features/{module}/{feature}/retro.md"
      subsystem: "subsystems/{name}.md"
      decision:  "DECISIONS.md"
      techdebt:  "tech-debt/{module}/{slug}.md"
    indexing:
      include: ["**/*.md"]
      exclude: ["**/draft-*.md"]

  # ── Working memory (per-session, ephemeral) ────────────────────────
  # Mirrors VS Code's session memory. Lives outside git, auto-cleared.
  session:
    kind: filesystem
    path: .planning                # gitignored
    layout:
      current:  "CURRENT.md"
      task:     "tasks/{task_id}.md"
      decision: "DECISIONS.md"     # session-level; promoted to specs.decision on close

# ── Alternatives for the cold tier ─────────────────────────────────────────
# specs:
#   kind: mcp
#   tool: knowledge-mcp           # foreign key into tools[].id
#   namespace: "acme/web"
#   schema: { read: "knowledge/get", write: "knowledge/put",
#             list: "knowledge/list", search: "knowledge/search" }
#
# specs:
#   kind: http
#   base_url: "https://kms.internal/api/v1"
#   api_key_env: KMS_API_KEY
#   endpoints: { read:  "GET /docs/{path}",
#                write: "PUT /docs/{path}",
#                list:  "GET /docs?prefix={prefix}",
#                search:"POST /search" }
#
# specs:
#   kind: composite               # write to repo + mirror to Notion
#   primary: filesystem-local
#   mirrors: [notion-mirror]
#   backends:
#     - { id: filesystem-local, kind: filesystem, path: vault/specs }
#     - { id: notion-mirror,    kind: mcp, tool: notion-mcp, namespace: "engineering" }

# ═══════════════════════════════════════════════════════════════════════════
# TOOLS / MCP
# ═══════════════════════════════════════════════════════════════════════════
tools:
  - id: serena
    kind: mcp-stdio
    command: serena-mcp
    args: ["--workspace", "."]
    enabled: true

  - id: context7
    kind: mcp-http
    url: "https://mcp.context7.com/mcp"
    api_key_env: CONTEXT7_API_KEY

  - id: web-search
    kind: builtin
    enabled: true

  - id: lsp-typescript
    kind: lsp
    command: typescript-language-server
    args: ["--stdio"]
    extensions: [".ts", ".tsx", ".js", ".jsx"]

  # Optional: knowledge backend served as MCP (referenced by knowledge.specs.tool)
  # - id: knowledge-mcp
  #   kind: mcp-http
  #   url: "https://kb.internal/mcp"
  #   api_key_env: KB_API_KEY

# ═══════════════════════════════════════════════════════════════════════════
# WORKFLOWS
# ═══════════════════════════════════════════════════════════════════════════
# Pipelines mapped to slash-commands per target. Each step ties an agent
# to a task_type — the resolver uses this to pick the right model for that
# step (via the agent's by_task entry, then global task_types defaults).

workflows:
  - id: feature
    description: "BA → arch → code → verify → close."
    trigger: "/new-feature"
    steps:
      - { agent: Architect,  task: planning,       gate: approve }
      - { agent: CodeWriter, task: implementation, gate: auto, on_fail: retry, max_retries: 3 }
      - { agent: Verifier,   task: review,         gate: auto, on_fail: rollback }
      - { agent: Verifier,   task: review,         gate: diff-review }

  - id: bug-fix
    description: "Triage → debug → fix → verify."
    trigger: "/fix"
    steps:
      - { agent: BugFixer, task: triage, gate: auto }
      - { agent: BugFixer, task: debug,  gate: auto }
      - { agent: Verifier, task: review, gate: approve }

  - id: tech-debt
    trigger: "/techdebt"
    steps:
      - { agent: Architect,  task: planning, gate: approve }
      - { agent: CodeWriter, task: refactor, gate: auto }
      - { agent: Verifier,   task: review,   gate: diff-review }

# ═══════════════════════════════════════════════════════════════════════════
# POLICIES
# ═══════════════════════════════════════════════════════════════════════════
policies:
  auto_approve:
    feature: false
    bug:
      low: true
      medium: true
      high: false
      critical: false
    diff_review: false

  slice_caps:
    max_steps: 6
    max_files_per_step: 5
    max_lines_per_step: 400
    max_tokens_per_step: 30000

  test_strategy: tdd_first        # tdd_first | test_after | mixed

  lanes:
    default_risk: standard        # trivial | standard | critical
    auto_classify: true
    trivial_max_files: 1
    trivial_max_lines: 30
    critical_block_sleep: true

  ground_truth:
    required: true
    exclusions: { modules: [] }

  forbidden_patterns:
    - "any in TypeScript without justification comment"
    - "console.log in production code"
    - "raw SQL string concat with user input"
    - "// eslint-disable-* without an issue id"
    - "TODO without a DECISIONS.md entry"

  secrets_policy:
    deny_literal_keys: true
    deny_patterns:
      - "sk-[A-Za-z0-9]{20,}"
      - "ghp_[A-Za-z0-9]{30,}"
      - "AKIA[0-9A-Z]{16}"

  # Hard model-selection floors for sensitive task types. The resolver
  # raises these on top of any agent's by_task override — agents cannot
  # downgrade below these. Use sparingly; this is a kit-wide policy.
  model_constraints:
    security-audit:
      min_tier: reasoner
      require_capabilities: [reasoning, code]
    planning:
      min_tier: reasoner

# ═══════════════════════════════════════════════════════════════════════════
# CONTEXT (global file-scan defaults)
# ═══════════════════════════════════════════════════════════════════════════
# Always-loaded files (memory_files) are now expressed via knowledge.constitution.
# This block keeps only file-scan globals.
context:
  ignore_globs: ["node_modules/**", "dist/**", ".next/**", "*.lock"]
  max_total_files: 200

# ═══════════════════════════════════════════════════════════════════════════
# EXTENDS / IMPORTS (optional)
# ═══════════════════════════════════════════════════════════════════════════
# Other manifests / profiles deep-merged before this one.
# Useful for org-wide defaults: extends: ["../org-defaults.yaml"]
extends: []

# ═══════════════════════════════════════════════════════════════════════════
# x.* — extension namespace (renderer ignores unknown keys here)
# ═══════════════════════════════════════════════════════════════════════════
x:
  team_owner: "platform"
  cost_budget_usd_per_day: 25
