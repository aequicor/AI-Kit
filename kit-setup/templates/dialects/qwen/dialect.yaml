dialect_version: "1.0.0"
id: qwen
display_name: "Qwen / Qwen-Coder"
applies_to_families: [qwen]
placeholders:
  - AGENT_ID
  - AGENT_DESC
  - BODY
  - PROJECT_NAME
  - STACK_SUMMARY
  - FORBIDDEN_PATTERNS
  - TOOLS_LIST
  - SKILL_ID
  - SKILL_DESCRIPTION
  - SKILL_TRIGGERS
  - SKILL_OUTPUT_FORMAT
  - COMMAND_NAME
  - COMMAND_DESCRIPTION
  - RULE_DESC
  - "snippet:*"
wrappers:
  agent:       wrappers/agent.md
  skill:       wrappers/skill.md
  command:     wrappers/command.md
  rule:        wrappers/rule.md
  user_prompt: wrappers/user_prompt.md
style:
  prefer_xml_tags: false
  prefer_markdown_headings: false
  prefer_compact: true             # Qwen-coder tuned for short, code-centric prompts
  max_directive_lines: 80          # Hard cap; Qwen-7b loses focus past this
  forbidden_constructs:
    - "long prose explanations"
    - "philosophical framing"
auto_transform:
  collapse_double_newlines: true
  trim_trailing_whitespace: true
  ensure_trailing_newline: true
notes: conventions.md
