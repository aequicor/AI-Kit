dialect_version: "1.0.0"
id: openai
display_name: "OpenAI GPT"
applies_to_families: [openai]
placeholders:
  - AGENT_ID
  - AGENT_DESC
  - BODY
  - PROJECT_NAME
  - STACK_SUMMARY
  - LANGUAGE_CODE
  - FORBIDDEN_PATTERNS
  - TOOLS_LIST
  - TOOLS_LIST_CSV
  - RESOLVED_MODEL
  - SKILL_ID
  - SKILL_DESCRIPTION
  - SKILL_TRIGGERS
  - SKILL_OUTPUT_FORMAT
  - COMMAND_NAME
  - COMMAND_DESCRIPTION
  - COMMAND_ARGS
  - RULE_DESC
  - "snippet:*"
wrappers:
  agent:       wrappers/agent.md
  skill:       wrappers/skill.md
  command:     wrappers/command.md
  rule:        wrappers/rule.md
  user_prompt: wrappers/user_prompt.md
snippets_dir: snippets
style:
  prefer_xml_tags: false
  prefer_markdown_headings: true
  use_thinking_blocks: false       # GPT prefers reasoning_effort param over inline blocks
  max_directive_lines: 150
  forbidden_constructs:
    - "deeply nested XML"
    - "ambiguous numbered lists with sub-letters"
auto_transform:
  collapse_double_newlines: true
  trim_trailing_whitespace: true
  ensure_trailing_newline: true
notes: conventions.md
