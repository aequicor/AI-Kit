dialect_version: "1.0.0"
id: deepseek
display_name: "DeepSeek"
applies_to_families: [deepseek]
placeholders:
  - AGENT_ID
  - AGENT_DESC
  - BODY
  - PROJECT_NAME
  - STACK_SUMMARY
  - LANGUAGE_CODE
  - LANGUAGE_NAME
  - FORBIDDEN_PATTERNS
  - TOOLS_LIST
  - SKILL_ID
  - SKILL_DESCRIPTION
  - SKILL_TRIGGERS
  - SKILL_OUTPUT_FORMAT
  - COMMAND_NAME
  - COMMAND_DESCRIPTION
  - RULE_DESC
  - "snippet:*"
wrappers:
  agent:       wrappers/agent.md
  skill:       wrappers/skill.md
  command:     wrappers/command.md
  rule:        wrappers/rule.md
  user_prompt: wrappers/user_prompt.md
style:
  prefer_markdown_headings: true
  use_thinking_blocks: true        # DeepSeek-R1 has native <think> support
  max_directive_lines: 200
auto_transform:
  collapse_double_newlines: true
  trim_trailing_whitespace: true
  ensure_trailing_newline: true
notes: conventions.md
